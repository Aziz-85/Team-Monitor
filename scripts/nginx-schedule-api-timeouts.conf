# Schedule Engine v3 — nginx timeout fix for 504 Gateway Timeout
#
# Symptom: "Failed (504)" on Schedule Solver or Schedule Assistant.
# Cause: default proxy_read_timeout (60s) is shorter than engine solve time on 1-vCPU VPS.
#
# Option A (recommended): add to your EXISTING location that proxy_passes to Node/PM2:
#
#   proxy_connect_timeout 120s;
#   proxy_send_timeout 120s;
#   proxy_read_timeout 120s;
#   proxy_buffering off;   # required if using keepalive stream from /api/schedule/v3/solve
#
# Option B: dedicated location (only if you do not already proxy /api/ elsewhere):
#
#   location ~ ^/api/schedule/(v3/solve|week/plan|week/generate) {
#       include proxy_params;   # or your usual proxy_set_header lines
#       proxy_pass http://127.0.0.1:3000;
#       proxy_connect_timeout 120s;
#       proxy_send_timeout 120s;
#       proxy_read_timeout 120s;
#   }
#
# Apply:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Verify solve duration in PM2 logs after deploy:
#   pm2 logs team-monitor --lines 50 | grep schedule/v3/solve
